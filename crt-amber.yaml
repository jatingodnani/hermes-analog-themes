name: crt-amber
label: "CRT Amber"
description: "Amber phosphor CRT terminal — warm glow, scanlines, and nostalgic flicker"

palette:
  background: "#080804"
  midground: "#ffb74d"
  foreground:
    hex: "#ffcc80"
    alpha: 0.15
  warmGlow: "rgba(255, 183, 77, 0.18)"
  noiseOpacity: 1.2

typography:
  fontSans: '"IBM Plex Mono", "VT323", ui-monospace, "Courier New", monospace'
  fontMono: '"IBM Plex Mono", ui-monospace, "Courier New", monospace'
  fontDisplay: '"VT323", "IBM Plex Mono", monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=VT323&display=swap"
  baseSize: "14px"
  lineHeight: "1.6"
  letterSpacing: "0.03em"

layout:
  radius: "0"
  density: "compact"

layoutVariant: standard

componentStyles:
  card:
    boxShadow: "inset 0 0 0 1px rgba(255, 183, 77, 0.12), 0 0 16px -4px rgba(255, 183, 77, 0.12)"
    background: "linear-gradient(180deg, rgba(12, 12, 6, 0.94), rgba(6, 6, 3, 0.98))"
  header:
    background: "linear-gradient(180deg, rgba(10, 10, 4, 0.98), rgba(6, 6, 2, 0.97))"
    boxShadow: "0 1px 0 rgba(255, 183, 77, 0.08)"
  tab:
    clipPath: "polygon(3px 0, calc(100% - 3px) 0, 100% 100%, 0 100%)"
  sidebar:
    background: "rgba(8, 8, 4, 0.98)"
    boxShadow: "1px 0 0 rgba(255, 183, 77, 0.06)"

colorOverrides:
  primary: "#ffb74d"
  primaryForeground: "#080804"
  accent: "#ffb74d"
  accentForeground: "#080804"
  secondary: "rgba(255, 183, 77, 0.1)"
  secondaryForeground: "#ffb74d"
  success: "#a8ff60"
  warning: "#ffb74d"
  destructive: "#ff5f5f"
  border: "rgba(255, 183, 77, 0.12)"
  ring: "rgba(255, 183, 77, 0.4)"
  mutedForeground: "rgba(255, 183, 77, 0.5)"
  muted: "rgba(255, 183, 77, 0.05)"
  card: "rgba(8, 8, 4, 0.94)"
  cardForeground: "#ffb74d"
  popover: "rgba(8, 8, 4, 0.98)"
  popoverForeground: "#ffb74d"
  input: "rgba(255, 183, 77, 0.06)"

customCSS: |
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9000;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0, 0, 0, 0.07) 3px,
      rgba(0, 0, 0, 0.07) 4px
    );
    mix-blend-mode: multiply;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 8999;
    background: radial-gradient(
      ellipse at center,
      transparent 50%,
      rgba(0, 0, 0, 0.1)  65%,
      rgba(0, 0, 0, 0.25) 80%,
      rgba(0, 0, 0, 0.45) 100%
    );
    mix-blend-mode: multiply;
  }

  h1, h2, h3, h4, h5, h6,
  [class*="font-mondwest"] {
    text-shadow:
      0 0 4px  rgba(255, 183, 77, 0.3),
      0 0 10px rgba(255, 183, 77, 0.14),
      0 0 20px rgba(255, 183, 77, 0.06);
  }

  a:hover,
  button:hover,
  [role="button"]:hover {
    text-shadow: 0 0 8px rgba(255, 183, 77, 0.5);
    transition: text-shadow 0.12s ease;
  }

  a[aria-current="page"] {
    text-shadow:
      0 0 6px  rgba(255, 183, 77, 0.45),
      0 0 14px rgba(255, 183, 77, 0.22);
  }

  @keyframes crtFlicker {
    0%,50%,99.6%,99.8% { opacity: 1; }
    99.5%               { opacity: 0.985; }
    99.7%               { opacity: 0.99; }
  }
  html { animation: crtFlicker 3s infinite ease-in-out; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.4); }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 183, 77, 0.18);
    border: 1px solid rgba(255, 183, 77, 0.08);
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 183, 77, 0.32); }

  ::selection {
    background: rgba(255, 183, 77, 0.28);
    color: #080804;
    text-shadow: none;
  }
  input:focus, textarea:focus, select:focus { caret-color: #ffb74d; }

  /* The shell button uses bg-foreground + text-background. Since background
     (#080804) and text-background (#080804) are both near-black, the text
     disappears. We retheme both the element and ALL its descendants. */
  button[class*="bg-foreground"],
  button[class*="bg-foreground"] *,
  [role="button"][class*="bg-foreground"],
  [role="button"][class*="bg-foreground"] * {
    background-color: rgba(255, 183, 77, 0.14) !important;
    color: #ffb74d !important;
    text-shadow: 0 0 6px rgba(255, 183, 77, 0.4) !important;
  }
  button[class*="bg-foreground"] {
    border: 1px solid rgba(255, 183, 77, 0.28) !important;
  }
  button[class*="bg-foreground"]:hover:not(:disabled),
  button[class*="bg-foreground"]:hover:not(:disabled) * {
    background-color: rgba(255, 183, 77, 0.22) !important;
    box-shadow: 0 0 10px rgba(255, 183, 77, 0.12) !important;
  }

  [class*="bg-foreground"]:not([class*="outline"]):not(input):not(textarea) {
    background-color: rgba(255, 183, 77, 0.18) !important;
    color: #ffb74d !important;
    border: 1px solid rgba(255, 183, 77, 0.35) !important;
  }
  [class*="bg-foreground"]:not([class*="outline"]):not(input):not(textarea) * {
    color: #ffb74d !important;
  }

  button[class*="outline"],
  [class*="Button"][class*="outline"] {
    border-color: rgba(255, 183, 77, 0.28) !important;
    color: #ffb74d !important;
    background: transparent !important;
  }
  button[class*="outline"] *,
  [class*="Button"][class*="outline"] * {
    color: #ffb74d !important;
  }
  button[class*="outline"]:hover,
  [class*="Button"][class*="outline"]:hover {
    background: rgba(255, 183, 77, 0.08) !important;
  }

  input[type="text"],
  input[type="search"],
  input[type="number"],
  input[type="password"],
  textarea, select,
  [class*="Input"] {
    background: rgba(255, 183, 77, 0.04) !important;
    border-color: rgba(255, 183, 77, 0.14) !important;
    color: #ffb74d !important;
  }
  input::placeholder, textarea::placeholder {
    color: rgba(255, 183, 77, 0.3) !important;
  }
  input:focus, textarea:focus, select:focus {
    border-color: rgba(255, 183, 77, 0.42) !important;
    box-shadow: 0 0 0 2px rgba(255, 183, 77, 0.1) !important;
  }

  [class*="Badge"], [class*="badge"] {
    background: rgba(255, 183, 77, 0.1) !important;
    color: #ffb74d !important;
    border-color: rgba(255, 183, 77, 0.22) !important;
    text-shadow: 0 0 4px rgba(255, 183, 77, 0.4) !important;
    letter-spacing: 0.05em;
  }

  [class*="sidebar"] [aria-selected="true"],
  [class*="nav"] [aria-selected="true"],
  [class*="Sidebar"] [aria-current] {
    background: rgba(255, 183, 77, 0.08) !important;
    border-left: 2px solid #ffb74d !important;
    color: #ffb74d !important;
  }
  [class*="sidebar"] *:focus-visible,
  [class*="Sidebar"] *:focus-visible {
    outline-color: #ffb74d !important;
  }

  [data-state="checked"] [class*="thumb"],
  [role="switch"][data-state="checked"] [class*="thumb"] {
    background: #ffb74d !important;
    box-shadow: 0 0 6px rgba(255, 183, 77, 0.5) !important;
  }
  [role="switch"][data-state="checked"] [class*="track"] {
    background: rgba(255, 183, 77, 0.2) !important;
  }

  .recharts-bar-rectangle path, .recharts-rectangle {
    fill: rgba(255, 183, 77, 0.55) !important;
  }
  [class*="recharts"] text { fill: #ffb74d !important; }

  .border-border, [class*="border-border"] {
    border-color: rgba(255, 183, 77, 0.12);
  }
